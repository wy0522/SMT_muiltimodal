version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: ai_pipeline_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: woo
      MONGO_INITDB_ROOT_PASSWORD: young
